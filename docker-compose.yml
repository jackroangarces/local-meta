services:
  backend:
    build:
      context: .
      dockerfile: py-backend/Dockerfile
    env_file:
      - py-backend/.env
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

